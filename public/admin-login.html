<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audit Recipe — Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Fustat:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#F9F9F8; --card:#FFFFFF; --ink:#0C0C0C; --ink2:#3A3A3A;
      --ink3:#7A7A7A; --ink4:#C0C0C0; --border:rgba(0,0,0,0.07);
      --borderMd:rgba(0,0,0,0.11); --blue:#0057FF; --red:#D94040;
      --green:#1A9E5C; --r:10px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; display: flex; flex-direction: column;
    }
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9998;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.022;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

    /* NAV — logo only, no links to public pages */
    header { border-bottom:1px solid var(--border); background:rgba(249,249,248,0.9); backdrop-filter:blur(24px); }
    nav { max-width:1100px; margin:0 auto; padding:0 44px; display:flex; align-items:center; height:58px; }
    .nav-logo {
      font-family:'Fustat',sans-serif; font-weight:800; font-size:16px;
      color:var(--ink); letter-spacing:-0.5px;
      display:flex; align-items:center; gap:9px;
    }
    .logo-icon { width:28px; height:28px; border-radius:7px; background:var(--ink); display:flex; align-items:center; justify-content:center; }
    .logo-icon svg { width:14px; height:14px; }
    .admin-badge { font-size:10px; font-weight:700; color:#fff; background:var(--red); padding:3px 8px; border-radius:100px; letter-spacing:.06em; margin-left:4px; }

    main { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }

    .card {
      background:var(--card); border:1px solid var(--borderMd);
      border-radius:16px; padding:40px; width:100%; max-width:400px;
      box-shadow:0 4px 32px rgba(0,0,0,0.06);
      animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both;
    }

    .shield-wrap { display:flex; justify-content:center; margin-bottom:22px; }
    .shield { width:52px; height:52px; border-radius:14px; background:var(--ink); display:flex; align-items:center; justify-content:center; }
    .shield svg { width:24px; height:24px; }

    h1 { font-family:'Fustat',sans-serif; font-size:26px; font-weight:800; letter-spacing:-1px; color:var(--ink); margin-bottom:6px; text-align:center; }
    .sub { font-size:13.5px; color:var(--ink3); font-weight:300; text-align:center; margin-bottom:28px; line-height:1.6; }

    .form-group { margin-bottom:16px; }
    label { display:block; font-size:12px; font-weight:500; color:var(--ink3); margin-bottom:6px; }

    input[type="text"], input[type="password"] {
      width:100%; padding:11px 13px;
      background:var(--bg); border:1px solid var(--borderMd);
      border-radius:var(--r); color:var(--ink); font-size:14px;
      font-family:'DM Sans',sans-serif; outline:none;
      transition:border-color .15s, box-shadow .15s;
      display:block;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color:var(--blue); box-shadow:0 0 0 3px rgba(0,87,255,0.08);
    }
    input::placeholder { color:var(--ink4); }
    input.err { border-color:var(--red) !important; box-shadow:0 0 0 3px rgba(217,64,64,0.08) !important; }

    .error-box {
      display:none; padding:11px 13px; border-radius:8px; margin-bottom:18px;
      background:rgba(217,64,64,0.06); border:1px solid rgba(217,64,64,0.2);
      color:var(--red); font-size:13px;
    }

    .btn-login {
      width:100%; padding:13px; border-radius:var(--r); border:none;
      background:var(--ink); color:#fff; font-size:15px; font-weight:500;
      font-family:'DM Sans',sans-serif; cursor:pointer;
      transition:opacity .15s, transform .2s; margin-top:6px;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-login:hover { opacity:.85; transform:translateY(-1px); }
    .btn-login:active { transform:translateY(0); }

    footer { border-top:1px solid var(--border); padding:20px 44px; text-align:center; }
    footer p { font-size:12px; color:var(--ink4); }
    @media(max-width:600px) { nav { padding:0 20px; } footer { padding:20px; } }
  </style>
</head>
<body>

<header>
  <nav>
    <div class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 14 14" fill="none">
          <path d="M2 10.5L5.5 5L8 8.5L10.5 5.5L13 10.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      Audit Recipe
      <span class="admin-badge">ADMIN</span>
    </div>
  </nav>
</header>

<main>
  <div class="card">

    <div class="shield-wrap">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 3L4 7v5c0 4.5 3.4 8.7 8 9.9 4.6-1.2 8-5.4 8-9.9V7L12 3z" stroke="white" stroke-width="1.6" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
    </div>

    <h1>Admin Access</h1>
    <p class="sub">Enter your credentials to access the Audit Recipe admin panel.</p>

    <div class="error-box" id="error-box"></div>

    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()"/>
    </div>

    <button class="btn-login" id="login-btn" onclick="login()">
      Access admin panel
      <svg viewBox="0 0 13 13" fill="none" width="12" height="12" style="opacity:.6">
        <path d="M2.5 6.5H10.5M7 3L10.5 6.5L7 10" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

  </div>
</main>

<footer>
  <p>© 2026 Worrkly · Audit Recipe · Admin</p>
</footer>

<script>
  // Redirect if already authenticated
  if (sessionStorage.getItem('fr_admin') === 'true') {
    window.location.href = 'admin-dashboard.html';
  }

  const ADMIN_USER = 'admin';
  const ADMIN_PASS = 'findingrecipe2026';

  function login() {
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;
    const err  = document.getElementById('error-box');
    const uInp = document.getElementById('username');
    const pInp = document.getElementById('password');

    err.style.display = 'none';
    uInp.classList.remove('err');
    pInp.classList.remove('err');

    if (!user && !pass) {
      err.textContent = 'Please enter your username and password.';
      err.style.display = 'block';
      uInp.classList.add('err');
      pInp.classList.add('err');
      uInp.focus();
      return;
    }
    if (!user) {
      err.textContent = 'Please enter your username.';
      err.style.display = 'block';
      uInp.classList.add('err');
      uInp.focus();
      return;
    }
    if (!pass) {
      err.textContent = 'Please enter your password.';
      err.style.display = 'block';
      pInp.classList.add('err');
      pInp.focus();
      return;
    }

    if (user === ADMIN_USER && pass === ADMIN_PASS) {
      sessionStorage.setItem('fr_admin', 'true');
      const btn = document.getElementById('login-btn');
      btn.textContent = 'Logging in...';
      btn.style.opacity = '0.7';
      setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 400);
    } else {
      err.textContent = 'Incorrect username or password. Please try again.';
      err.style.display = 'block';
      uInp.classList.add('err');
      pInp.classList.add('err');
      pInp.value = '';
      pInp.focus();
    }
  }

  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('username').focus();
  });
</script>
</body>
</html>
